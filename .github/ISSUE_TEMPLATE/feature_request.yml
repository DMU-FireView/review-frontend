name: Feature Request
description: 새로운 기능 또는 개선 사항을 제안합니다.
title: "[Feature] "
labels: ["type: feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: 어떤 문제를 해결하기 위한 기능인가요?
      placeholder: 예) 사용자가 상품 리뷰의 신뢰도를 홈에서 빠르게 파악하기 어렵습니다.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: 원하는 해결 방향을 작성해주세요.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - Landing
        - Auth
        - Home
        - Product
        - Review Analysis
        - Report
        - Shared UI
        - Architecture
        - CI/CD
    validations:
      required: true

  - type: textarea
    id: requirements
    attributes:
      label: Requirements
      description: 기능 요구사항을 checklist로 작성해주세요.
      placeholder: |
        - [ ] 추천 상품 섹션을 표시한다.
        - [ ] 모바일에서 1열 리스트로 전환한다.

  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of Scope
      description: 이번 이슈에서 하지 않을 범위를 작성해주세요.

  - type: textarea
    id: references
    attributes:
      label: References
      description: Figma, PRD, API 문서, 관련 이슈 링크가 있다면 첨부해주세요.
